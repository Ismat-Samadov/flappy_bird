<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1565c0"/>

  <!-- Bird body -->
  <ellipse cx="32" cy="34" rx="16" ry="14" fill="#FFE033"/>

  <!-- Wing -->
  <ellipse cx="30" cy="38" rx="10" ry="6" transform="rotate(-15 30 38)" fill="#F5A623"/>

  <!-- Eye white -->
  <circle cx="40" cy="28" r="7" fill="white"/>
  <!-- Pupil -->
  <circle cx="42" cy="28" r="3.5" fill="#1a1a2e"/>
  <!-- Shine -->
  <circle cx="43" cy="26.5" r="1.2" fill="white"/>

  <!-- Beak -->
  <polygon points="46,30 54,32 46,35" fill="#FF8C00"/>
  <line x1="46" y1="32" x2="54" y2="32" stroke="#cc6600" stroke-width="1"/>
</svg>
